<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espanttos IA - Noticias de Tecnología</title>
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: #1a1d2e;
            --text-main: #f0f2f5;
            --text-muted: #a0aec0;
            --accent: #00ffaa;
            --accent-hover: #00cc88;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #16192b, #0f111a);
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 20px rgba(0, 255, 170, 0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        header h1 span {
            color: var(--accent);
        }

        header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-size: 1.1rem;
        }

        main {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        #news-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .news-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 255, 170, 0.15);
            border-color: rgba(0, 255, 170, 0.3);
        }

        .news-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .news-date {
            font-size: 0.85rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .news-title {
            font-size: 1.3rem;
            margin: 0 0 1rem 0;
            line-height: 1.4;
            color: var(--text-main);
        }

        .news-description {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .news-link {
            align-self: flex-start;
            background-color: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .news-link:hover {
            background-color: var(--accent);
            color: var(--bg-color);
        }

        .loading, .error-msg {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            padding: 3rem;
            color: var(--text-muted);
        }

        .error-msg {
            color: #ff5555;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 4rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>⚡ Universo <span>IA</span></h1>
        <p>Actualidad tecnológica de Xataka maquetada en tiempo real</p>
    </header>

    <main>
        <div id="news-container">
            <div class="loading">Invocando a las IA... Cargando noticias...</div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Espanttos Labs. Alimentado por el RSS de Xataka.</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const rssUrl = "https://feeds.feedburner.com/xataka2";
            const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
            const container = document.getElementById("news-container");

            fetch(proxyUrl)
                .then(response => {
                    if (!response.ok) throw new Error("Error en la red");
                    return response.json();
                })
                .then(data => {
                    container.innerHTML = "";

                    if (data.status !== "ok" || !data.items || data.items.length === 0) {
                        container.innerHTML = `<div class="error-msg">No se han podido cargar las noticias.</div>`;
                        return;
                    }

                    data.items.slice(0, 12).forEach(item => {
                        let cleanDescription = item.description.replace(/<[^>]*>/g, '');
                        if (cleanDescription.length > 150) {
                            cleanDescription = cleanDescription.substring(0, 150) + "...";
                        }

                        const pubDate = new Date(item.pubDate);
                        const formattedDate = pubDate.toLocaleDateString('es-ES', {
                            day: '2-digit',
                            month: 'short',
                            year: 'numeric'
                        });

                        const card = document.createElement("div");
                        card.className = "news-card";
                        card.innerHTML = `
                            <div class="news-content">
                                <div class="news-date">${formattedDate}</div>
                                <h2 class="news-title">${item.title}</h2>
                                <p class="news-description">${cleanDescription}</p>
                                <a href="${item.link}" target="_blank" class="news-link">Leer artículo completo</a>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                })
                .catch(error => {
                    console.error("Error:", error);
                    container.innerHTML = `<div class="error-msg">¡Vaya! No se han podido cargar las noticias por un problema de conexión.</div>`;
                });
        });
    </script>
</body>
</html>
