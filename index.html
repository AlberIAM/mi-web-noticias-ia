<script>
  // Cambia ESTE enlace por el tuyo de Make (el de la burbuja rosa custom webhook)
  const URL_MAKE = 'https://hook.us1.make.com/tu_codigo_secreto_aqui';

  async function cargarNoticias() {
    try {
      const response = await fetch(URL_MAKE);
      const data = await response.json();
      
      // Make envía los datos dentro de una estructura de "bundles". 
      // Esta línea extrae la lista real de noticias venga como venga:
      const noticias = data.value || (data[0] && data[0].value) || data;

      const contenedor = document.getElementById('noticias-container'); // O como se llame tu contenedor
      contenedor.innerHTML = ''; // Limpiamos el texto de "Inicializando..."

      if (!noticias || noticias.length === 0) {
        contenedor.innerHTML = '<p class="text-center">No hay noticias disponibles hoy.</p>';
        return;
      }

      // Pintamos las noticias en la web
      noticias.forEach(noticia => {
        const item = noticia.data || noticia; // Por si vienen dentro de la propiedad "data"
        const card = document.createElement('div');
        card.className = 'noticia-card'; // Adapta la clase a tu CSS si es necesario
        card.innerHTML = `
          <h2>${item.titulo || item.title || 'Sin título'}</h2>
          <p>${item.descripcion || item.description || ''}</p>
          <a href="${item.enlace || item.url || '#'}" target="_blank">Leer más →</a>
        `;
        contenedor.appendChild(card);
      });

    } catch (error) {
      console.error('Error al conectar con el robot:', error);
      document.getElementById('noticias-container').innerHTML = 
        '<p class="text-center text-danger">Error de conexión con la base de datos.</p>';
    }
  }

  // Arrancamos la carga al entrar a la web
  document.addEventListener('DOMContentLoaded', cargarNoticias);
</script>
