<script>
  const URL_MAKE = 'https://hook.us1.make.com/tu_codigo_secreto_aqui';

  async function cargarNoticias() {
    const contenedor = document.getElementById('noticias-container');
    if (!contenedor) return;

    try {
      const response = await fetch(URL_MAKE);
      if (!response.ok) throw new Error('Respuesta de red incorrecta');
      
      const data = await response.json();
      console.log("Datos del robot:", data);

      // Limpiamos el texto de carga
      contenedor.innerHTML = '';

      // Si Make nos envía el paquete directo o dentro de un array
      let noticias = Array.isArray(data) ? data : (data.value || []);
      if (noticias.length === 0 && data[0] && data[0].value) {
        noticias = data[0].value;
      }

      if (noticias.length === 0) {
        contenedor.innerHTML = '<p style="text-center; color: #fff;">No hay noticias guardadas hoy.</p>';
        return;
      }

      // Maquetación ultra-limpia
      noticias.forEach(item => {
        const info = item.data || item;
        const tarjeta = document.createElement('div');
        tarjeta.className = 'noticia-card';
        tarjeta.innerHTML = `
          <h2 style="color: #00ffaa; margin-top: 20px;">${info.titulo || 'Noticia'}</h2>
          <p style="color: #ffffff; margin-bottom: 10px;">${info.descripcion || ''}</p>
          <a href="${info.enlace || '#'}" target="_blank" style="color: #00ffff; font-weight: bold;">Leer más →</a>
          <hr style="opacity: 0.2; margin-top: 15px;">
        `;
        contenedor.appendChild(tarjeta);
      });

    } catch (error) {
      console.error('Error al conectar:', error);
      contenedor.innerHTML = '<p style="color: #ff4444; text-align: center;">Error de conexión con el almacén de datos.</p>';
    }
  }

  document.addEventListener('DOMContentLoaded', cargarNoticias);
</script>
